spring.application.name=SentiDiary

spring.mvc.view.prefix=/WEB-INF/views/
spring.mvc.view.suffix=.jsp

server.port=8088
server.servlet.context-path=/SentiDiary
server.servlet.session.timeout=3600

logging.level=debug
logging.level.deu.se.ood=debug

# JPA + MySQL
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

spring.datasource.url=jdbc:mysql://localhost:3306/senti_diary?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
spring.datasource.username=jdbctester
spring.datasource.password=12345
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
